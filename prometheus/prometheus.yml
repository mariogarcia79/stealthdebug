global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "integrations/node_exporter"
    static_configs:
      - targets: ["node:9100"]

  - job_name: "integrations/podman_exporter"
    static_configs:
      - targets: ["exporter:9882"]

  - job_name: "prometheus"
    static_configs:
      - targets: ['localhost:9090']

remote_write:
  - url: https://prometheus-prod-65-prod-eu-west-2.grafana.net/api/prom/push
    basic_auth:
      username: 2863039
      password: "<SIGNING_TOKEN>"